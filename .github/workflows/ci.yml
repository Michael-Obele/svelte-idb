name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --no-package-lock --allow-git=none
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npm run package
      - run: npm run test:browser